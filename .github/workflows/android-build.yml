name: Android Build

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'android/**'
      - 'index.html'
      - 'script.js'
      - 'style.css'
      - 'backend-api.js'
      - 'assets/**'
      - 'src/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'android/**'
      - 'index.html'
      - 'script.js'
      - 'style.css'
      - 'backend-api.js'
      - 'assets/**'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-web-content:
    name: Sync Web Content to Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync web files to Android assets
        run: |
          echo "Syncing web content to Android bundle..."
          ANDROID_WEB_DIR="android/app/src/main/assets/WebContent"

          # Main game files
          cp -v index.html    "$ANDROID_WEB_DIR/index.html"
          cp -v script.js     "$ANDROID_WEB_DIR/script.js"
          cp -v style.css     "$ANDROID_WEB_DIR/style.css"

          # Auth + social UI
          cp -v auth-system.js        "$ANDROID_WEB_DIR/auth-system.js"
          cp -v leaderboard-system.js "$ANDROID_WEB_DIR/leaderboard-system.js"
          cp -v social-ui.js          "$ANDROID_WEB_DIR/social-ui.js"
          cp -v social-ui.css         "$ANDROID_WEB_DIR/social-ui.css"

          # API and supporting files
          cp -v backend-api.js   "$ANDROID_WEB_DIR/backend-api.js"
          cp -v audio-manager.js "$ANDROID_WEB_DIR/audio-manager.js"
          cp -v game-utils.js    "$ANDROID_WEB_DIR/game-utils.js"

          # Social integration
          cp -v social-api.js         "$ANDROID_WEB_DIR/social-api.js"
          cp -v social-hub.js         "$ANDROID_WEB_DIR/social-hub.js"
          cp -v social-integration.js "$ANDROID_WEB_DIR/social-integration.js"
          cp -v unified-social.js     "$ANDROID_WEB_DIR/unified-social.js"

          # src directory (modular game code)
          rsync -av --delete src/ "$ANDROID_WEB_DIR/src/"

          # Assets
          rsync -av --delete assets/ "$ANDROID_WEB_DIR/assets/"

          echo "Web content sync complete!"

      - name: Upload synced content as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-web-content
          path: android/app/src/main/assets/WebContent/
          retention-days: 1

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    needs: sync-web-content
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download synced web content
        uses: actions/download-artifact@v4
        with:
          name: android-web-content
          path: android/app/src/main/assets/WebContent/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Import signing keystore (if configured)
        working-directory: android
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "No keystore configured; release build will be unsigned."
            exit 0
          fi
          echo "Importing signing keystore..."
          echo -n "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > keystore.jks
          echo "ANDROID_KEYSTORE_FILE=$PWD/keystore.jks" >> "$GITHUB_ENV"

      - name: Build Debug APK (always)
        working-directory: android
        run: gradle assembleDebug

      - name: Build Release AAB
        working-directory: android
        run: gradle bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VoidRift-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: VoidRift-Release-AAB
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload to Google Play (if configured)
        if: |
          (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
          env.ANDROID_KEYSTORE_BASE64 != '' &&
          env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.voidrift.game
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      - name: Summary
        run: |
          echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Android build completed" >> $GITHUB_STEP_SUMMARY
          echo "📦 Debug APK and Release AAB available in artifacts" >> $GITHUB_STEP_SUMMARY
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "🔑 Release build signed with provided keystore" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚙️  Release build unsigned (no keystore configured)" >> $GITHUB_STEP_SUMMARY
          fi
